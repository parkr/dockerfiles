name: Publish to GitHub Container Registry on push to main
'on':
  push:
    branches:
      - main
      - github-actions
  workflow_dispatch: {}

jobs:
  Detect_projects:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.set-matrix.outputs.projects }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          PROJECTS=$(find * -maxdepth 1 -type d -exec test -f {}/VERSION \; -exec test -f {}/Dockerfile \; -print | grep -v 'homeassistant' | jq -R -s -c 'split("\n")[:-1]')
          echo "projects=${PROJECTS}" >> "$GITHUB_OUTPUT"

  Publish:
    needs: Detect_projects
    name: Publish ${{ matrix.project }} to GitHub Container Registry
    runs-on: ubuntu-latest
    permissions:
      actions: none
      checks: none
      contents: none
      deployments: none
      issues: none
      packages: write
      pull-requests: none
      repository-projects: none
      security-events: none
      statuses: none
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.Detect_projects.outputs.projects) }}
    steps:
      - uses: actions/checkout@v6
      - name: Docker Login
        uses: parkr/actions/docker-auth@main
        with:
          args: login
        env:
          DOCKER_USERNAME: "${{ secrets.GPR_USERNAME }}"
          DOCKER_PASSWORD: "${{ secrets.GPR_PASSWORD }}"
          DOCKER_REGISTRY_URL: ghcr.io
      - name: Download cosign key
        run: echo "$COSIGN_KEY" > cosign.key && cat cosign.key | wc -c
        shell: bash
        env:
          COSIGN_KEY: "${{secrets.COSIGN_KEY}}"
      - name: Set up Docker Buildx
        uses: parkr/actions/docker-make@main
        with:
          args: docker-buildx-create
      - name: Publish ${{ matrix.project }}
        uses: parkr/actions/docker-make@main
        with:
          args: publish-${{ matrix.project }} sign-${{ matrix.project }} -e NAMESPACE=ghcr.io/parkr
          cosign-password: "${{secrets.COSIGN_KEY_PASSPHRASE}}"
      - name: Delete cosign key
        run: rm cosign.key
      - name: Docker Logout
        uses: parkr/actions/docker-auth@main
        with:
          args: logout
        env:
          DOCKER_REGISTRY_URL: ghcr.io
